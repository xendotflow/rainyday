<!-- public/index.html -->


<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>rainyday</title>
  <link rel="icon" href="/assets/icons/favicon.ico">
  <link rel="stylesheet" href="/styles/base.css">
  <link rel="stylesheet" href="/styles/styles.css">
  <link rel="stylesheet" href="/styles/chat.css">
</head>
<body class="app-body">
      <a href="/home.html"><img id="siteLogo" src="/assets/icons/logo.png" alt="Logo"></a>

  <div id="hudContainer">
    <div id="userInfo">
      <span id="usernameDisplay" data-points="0" onclick="openAccountSettingsModal()"></span>
      &nbsp;|&nbsp;
      <a href="/logout" style="color: #fff; text-decoration: underline;">Logout</a>
    </div>
  </div>

  <!-- Top-right controls: DND toggle, Chat toggle, Players toggle, and Fullscreen button -->
  <div id="topRightChatControls">
    <button id="toggleDNDButton" onclick="toggleDNDMode()" title="Do Not Disturb">
      <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <!-- Crescent moon icon -->
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>
    <button id="togglePlayersButton" onclick="togglePlayersVisibility()" title="Toggle Players List">
      <svg id="onlineUsersIconVisible" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line>
      </svg>
      <svg id="onlineUsersIconHidden" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
         <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="23" y1="11" x2="17" y2="11"></line>
      </svg>
    </button>
    <button id="toggleChatButton" onclick="toggleChatVisibility()" title="Toggle Chat">
       <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
         <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
       </svg>
    </button>
    <button id="controls-fullscreen" class="unselectable" onclick="toggleFullscreen()">
      <svg viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M13.5 13.5H10m3.5 0V10m0 3.5l-4-4m.5-8h3.5m0 0V5m0-3.5l-4 4M5 1.5H1.5m0 0V5m0-3.5l4 4m-4 4.5v3.5m0 0H5m-3.5 0l4-4" stroke="currentColor"></path>
      </svg>
    </button>
  </div>

  <div id="viewport">
    <div id="status">Preparing...</div>
    <input id="proxy" style="position: absolute; opacity: 0; width: 0; height: 0;">
    <canvas id="canvas" tabindex="-1" class="unselectable" width="640" height="480"></canvas>
  </div>

  <div id="buttons" class="unselectable">
    <!-- Additional controls (notifications, etc.) can be added here -->
  </div>

  <div id="dpad" class="unselectable">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72" class="baseColorFill">
      <path id="dpad-up" data-key="ArrowUp" data-key-code="38" d="M48,5.8C48,2.5,45.4,0,42,0H29.9C26.6,0,24,2.4,24,5.8V24h24V5.8z" />
      <path id="dpad-right" data-key="ArrowRight" data-key-code="39" d="M66.2,24H48v24h18.2c3.3,0,5.8-2.7,5.8-6V29.9C72,26.5,69.5,24,66.2,24z" />
      <path id="dpad-down" data-key="ArrowDown" data-key-code="40" d="M24,66.3c0,3.3,2.6,5.7,5.9,5.7H42c3.3,0,6-2.4,6-5.7V48H24V66.3z" />
      <path id="dpad-left" data-key="ArrowLeft" data-key-code="37" d="M5.7,24C2.4,24,0,26.5,0,29.9V42c0,3.3,2.3,6,5.7,6H24V24H5.7z" />
      <rect id="dpad-center" x="24" y="24" width="24" height="24" />
    </svg>
  </div>

  <div id="apad" class="unselectable">
    <div id="apad-shift" class="baseColorBg apadCircBtn apadBtn" data-key="Shift" data-key-code="16"></div>
    <div id="apad-escape" class="baseColorBg apadCircBtn apadBtn" data-key="Escape" data-key-code="27"></div>
    <div id="apad-enter" class="baseColorBg apadCircBtn apadBtn" data-key="Enter" data-key-code="13"></div>
  </div>

  <!-- Separate Online Users Container (Initially Visible?) -->
  <div id="onlineUsersContainer">
    <h3>Online</h3>
    <ul id="onlineUsersList"></ul>
  </div>

  <!-- Separate Chat Container (Initially Visible?) -->
  <div id="chatContainer">
    <div id="chatMessages"></div>
    <div id="chatInputArea">
      <input type="text" id="chatInput" placeholder="Type a message..." maxlength="500">
      <button id="chatSend">Send</button>
    </div>
  </div>

  <div id="scriptTagText">
    <!-- If you need dynamic script loading, ensure a valid script tag is present -->
    <script async type="text/javascript" src="/assets/js/index.js"></script>
  </div>

  <!-- Account Settings Modal -->
  <div id="accountSettingsModal" class="modal">
    <div class="modal-content">
      <button class="close-modal" id="closeAccountSettingsBtn" onclick="closeAccountSettingsModal()">&times;</button>
      <h2>Account Settings</h2>
      <p>Your account details or additional settings can go here.</p>

      <!-- Name Color Picker -->
      <div>
        <label for="nameColor">Name Color:</label>
        <input type="color" id="nameColor" value="#ffffff">
        <button onclick="saveNameColor()" class="user-button">Save Color</button>
      </div>
      <hr>
      <!-- Badge Upload Section -->
      <div>
        <label for="badgeFile">Upload Badge (PNG or GIF):</label>
        <input type="file" id="badgeFile" accept="image/png, image/gif">
        <button onclick="uploadBadge()" class="user-button">Save Badge</button>
      </div>
      <hr>
      <!-- Ping Sound Upload Section -->
      <div>
        <label for="pingFile">Upload Custom Ping Sound (WAV or MP3):</label>
        <input type="file" id="pingFile" accept="audio/wav, audio/x-wav, audio/mpeg, audio/mp3">
        <button onclick="uploadPing()" class="user-button">Save Ping Sound</button>
      </div>
    </div>
  </div>



  <script src="scripts/game-names.js"></script>
  <script type="module" src="scripts/scripts.js"></script>
  <script src="scripts/pointsSystem.js"></script>
  <script src="scripts/chat.js"></script>
  <script src="scripts/mobile-controls.js"></script>
  <script type="module" src="scripts/ui-utils.js" id="ui-utils"></script>
  <script src="scripts/ui-controls.js"></script>
</body>
</html>
