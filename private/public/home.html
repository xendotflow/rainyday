<!-- public/home.html -->

<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>rainyday - home</title>
  <link rel="icon" href="/assets/icons/favicon.ico">
  <link rel="stylesheet" href="/styles/base.css">
  <link rel="stylesheet" href="/styles/home.css">
  <link rel="stylesheet" href="/styles/chat.css">
</head>
<body class="home-body">
  <div id="fog-background"></div>

  <!-- User Info HUD (Top Center) -->
  <div id="hudContainer">
    <div id="userInfo">
      <span>Welcome back <span id="usernameDisplay" data-points="0" onclick="openAccountSettingsModal()">User</span></span>
      <a href="/logout">Logout</a>
    </div>
  </div>

  <!-- Top Left Buttons -->
  <div id="topLeftButtons">
    <button class="user-button" onclick="openHomeSettingsModal()" title="Home Settings">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1 1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
    </button>
    <button id="closeRegistrationsButton" class="user-button" style="display: none;" onclick="toggleRegistrations()">Toggle Registrations</button>
  </div>

  <!-- Top Right Chat/Player Toggles -->
  <div id="topRightChatControlsHome">
    <button id="toggleDNDButton" onclick="toggleDNDMode()" title="Do Not Disturb">
      <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <!-- Crescent moon icon -->
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>
    <button id="togglePlayersButton" onclick="togglePlayersVisibility()" title="Toggle Players List">
      <svg id="onlineUsersIconVisible" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line>
      </svg>
      <svg id="onlineUsersIconHidden" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
         <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="23" y1="11" x2="17" y2="11"></line>
      </svg>
    </button>
    <button id="toggleChatButton" onclick="toggleChatVisibility()" title="Toggle Chat">
       <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
         <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
       </svg>
    </button>
  </div>

  <!-- Game Doors Container -->
  <div id="doors" class="container">
    <!-- Game logos will be loaded here by home.js -->
    <p style="text-align: center; grid-column: 1 / -1;">Loading games...</p>
  </div>

  <!-- Chat & Online Users Panels -->
  <div id="onlineUsersContainer">
    <h3>Online</h3>
    <ul id="onlineUsersList"></ul>
  </div>
  <div id="chatContainer">
    <div id="chatMessages"></div>
    <div id="chatInputArea">
      <input type="text" id="chatInput" placeholder="Type a message..." maxlength="500">
      <button id="chatSend">Send</button>
    </div>
  </div>

  <!-- Modals -->


  <!-- Asset Submission Modal -->
  <div id="assetModal" class="modal">
    <div class="modal-content">
      <button class="close-modal" onclick="closeAssetModal()">&times;</button>
      <h2>Submit Assets</h2>
      <form id="assetForm">
        <label for="gameSelect">Select Game:</label>
        <select id="gameSelect" name="game" required></select>
        <label for="assetType">Asset Type:</label>
        <select id="assetType" name="type" required>
          <option value="logos">Logo</option>
          <option value="stamps">Stamp</option>
        </select>
        <div id="stampFields" style="display: none;">
          <label for="mapId">Map ID (4 digits, e.g., 0001):</label>
          <input type="text" id="mapId" name="mapId" pattern="[0-9]{4}" placeholder="0001" maxlength="4">
          <label for="stampName">Stamp Name:</label>
          <input type="text" id="stampName" name="stampName" placeholder="e.g., Library Tester">
          <label for="stampLocation">Location:</label>
          <input type="text" id="stampLocation" name="stampLocation" placeholder="e.g., Library">
          <label for="stampDescription">Description:</label>
          <textarea id="stampDescription" name="stampDescription" placeholder="Brief description of the stamp"></textarea>
        </div>
        <label for="fileInput">Upload File (PNG recommended):</label>
        <input type="file" id="fileInput" name="file" accept="image/png, image/jpeg, image/gif" required>
        <button type="submit" class="user-button">Submit</button>
      </form>
      <p style="font-size: 0.8em; opacity: 0.7; margin-top: var(--space-md);">Note: Uploaded assets may be reviewed before appearing.</p>
    </div>
  </div>

  <!-- Home Settings Modal -->
  <div id="homeSettingsModal" class="modal">
    <div class="modal-content">
       <button class="close-modal" onclick="closeHomeSettingsModal()">&times;</button>
       <h2>Home Settings</h2>
       <p>Customize the logos displayed for each game:</p>
       <div id="gameLogoSettings">
         <label for="gameSelectSettings">Select Game:</label>
         <select id="gameSelectSettings" class="game-select" onchange="loadGameAssets(this.value)"></select>
         <label for="assetSelectSettings">Select Asset:</label>
         <select id="assetSelectSettings" class="asset-select" disabled>
           <option value="none">Default</option>
         </select>
         <button class="user-button" onclick="saveHomeSettings()">Save Logo</button>
         <div style="margin-top: 20px;">
           <button class="user-button" onclick="resetToDefault()">Reset This Logo</button>
           <button class="user-button" onclick="clearAllLogos()">Reset All Logos</button>
         </div>
       </div>
     </div>
   </div>

  <!-- Account Settings Modal -->
  <div id="accountSettingsModal" class="modal">
    <div class="modal-content">
      <button class="close-modal" id="closeAccountSettingsBtn" onclick="closeAccountSettingsModal()">&times;</button>
      <h2>Account Settings</h2>
      <p>Customize your appearance.</p>
      <!-- Name Color Picker -->
      <div>
        <label for="nameColor">Name Color:</label>
        <input type="color" id="nameColor" value="#e0e0e0">
        <button onclick="saveNameColor()" class="user-button">Save Color</button>
      </div>
      <hr>
      <!-- Badge Upload Section -->
      <div>
        <label for="badgeFile">Upload Badge (PNG or GIF, ~37x37px):</label>
        <input type="file" id="badgeFile" accept="image/png, image/gif">
        <button onclick="uploadBadge()" class="user-button">Save Badge</button>
      </div>
      <hr>
      <!-- Ping Sound Upload Section -->
      <div>
        <label for="pingFile">Upload Custom Ping Sound (WAV or MP3):</label>
        <input type="file" id="pingFile" accept="audio/wav, audio/x-wav, audio/mpeg, audio/mp3">
        <button onclick="uploadPing()" class="user-button">Save Ping Sound</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="scripts/game-names.js"></script>
  <script src="scripts/ui-controls.js"></script>
  <script src="scripts/home.js"></script>
  <script src="scripts/chat.js"></script>
  <script src="scripts/pointsSystem.js"></script>
  <script>
    // Home page specific modal functions
    window.openAssetModal = () => document.getElementById('assetModal')?.classList.add('is-active');
    window.closeAssetModal = () => document.getElementById('assetModal')?.classList.remove('is-active');
    window.openHomeSettingsModal = () => document.getElementById('homeSettingsModal')?.classList.add('is-active');
    window.closeHomeSettingsModal = () => document.getElementById('homeSettingsModal')?.classList.remove('is-active');
  </script>
</body>
</html>
